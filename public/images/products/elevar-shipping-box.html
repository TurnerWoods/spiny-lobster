<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELEVAR Premium Shipping Box</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #F6F5F3;
        }
    </style>
</head>
<body>
    <svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- Subtle linen texture -->
            <pattern id="linenTexture" patternUnits="userSpaceOnUse" width="4" height="4">
                <rect width="4" height="4" fill="#F6F5F3"/>
                <rect x="0" y="0" width="1" height="1" fill="#F2F0ED" opacity="0.5"/>
                <rect x="2" y="2" width="1" height="1" fill="#F9F7F5" opacity="0.5"/>
            </pattern>

            <!-- Gold emboss gradient -->
            <linearGradient id="goldEmboss" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#D4B872"/>
                <stop offset="25%" style="stop-color:#C9A962"/>
                <stop offset="50%" style="stop-color:#E0C987"/>
                <stop offset="75%" style="stop-color:#C9A962"/>
                <stop offset="100%" style="stop-color:#B89A52"/>
            </linearGradient>

            <!-- Charcoal box gradient -->
            <linearGradient id="boxTop" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#3A363C"/>
                <stop offset="100%" style="stop-color:#2F2B31"/>
            </linearGradient>

            <linearGradient id="boxFront" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#2F2B31"/>
                <stop offset="100%" style="stop-color:#252225"/>
            </linearGradient>

            <linearGradient id="boxSide" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#252225"/>
                <stop offset="100%" style="stop-color:#2A262C"/>
            </linearGradient>

            <!-- Soft shadow -->
            <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
                <feDropShadow dx="0" dy="30" stdDeviation="40" flood-color="#1a1a1a" flood-opacity="0.15"/>
            </filter>

            <!-- Emboss effect for logo -->
            <filter id="emboss" x="-10%" y="-10%" width="120%" height="120%">
                <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
                <feOffset in="blur" dx="1" dy="1" result="offsetBlur"/>
                <feFlood flood-color="#4a464c" result="dark"/>
                <feComposite in="dark" in2="offsetBlur" operator="in" result="darkShadow"/>
                <feOffset in="blur" dx="-0.5" dy="-0.5" result="offsetBlur2"/>
                <feFlood flood-color="#E0C987" result="light"/>
                <feComposite in="light" in2="offsetBlur2" operator="in" result="lightHighlight"/>
                <feMerge>
                    <feMergeNode in="darkShadow"/>
                    <feMergeNode in="lightHighlight"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>

        <!-- Background -->
        <rect width="1200" height="800" fill="url(#linenTexture)"/>

        <!-- Subtle gradient overlay -->
        <rect width="1200" height="800" fill="url(#linenTexture)" opacity="0.3"/>

        <!-- Box Group -->
        <g filter="url(#softShadow)" transform="translate(600, 420)">
            <!-- Box Right Side -->
            <polygon points="140,0 140,180 280,-50 280,-230" fill="url(#boxSide)"/>

            <!-- Box Front Face -->
            <polygon points="-280,-50 140,0 140,180 -280,130" fill="url(#boxFront)"/>

            <!-- Box Top Face -->
            <polygon points="-280,-50 140,0 280,-50 -140,-100" fill="url(#boxTop)"/>

            <!-- Subtle edge highlight on top -->
            <line x1="-280" y1="-50" x2="140" y2="0" stroke="#444046" stroke-width="1" opacity="0.5"/>
            <line x1="140" y1="0" x2="280" y2="-50" stroke="#444046" stroke-width="1" opacity="0.5"/>

            <!-- Embossed Chevron Logo on Front -->
            <g transform="translate(-70, 40)" filter="url(#emboss)">
                <!-- Chevron mark -->
                <path d="M0,-50 L40,0 L0,50 L0,30 L25,0 L0,-30 Z" fill="url(#goldEmboss)" opacity="0.9"/>

                <!-- ELEVAR text -->
                <g transform="translate(55, -15)">
                    <text x="0" y="0" font-family="'Didot', 'Playfair Display', serif" font-size="32"
                          fill="url(#goldEmboss)" letter-spacing="8" font-weight="300">ELEVAR</text>
                </g>

                <!-- Tagline -->
                <text x="55" y="25" font-family="'Helvetica Neue', sans-serif" font-size="8"
                      fill="url(#goldEmboss)" letter-spacing="3" opacity="0.8">PEPTIDE WELLNESS</text>
            </g>

            <!-- Subtle corner accents -->
            <line x1="-270" y1="-40" x2="-240" y2="-35" stroke="url(#goldEmboss)" stroke-width="0.5" opacity="0.4"/>
            <line x1="130" y1="8" x2="130" y2="40" stroke="url(#goldEmboss)" stroke-width="0.5" opacity="0.4"/>
        </g>

        <!-- Decorative elements -->
        <g opacity="0.1">
            <circle cx="150" cy="680" r="100" fill="none" stroke="#C9A962" stroke-width="0.5"/>
            <circle cx="1050" cy="120" r="60" fill="none" stroke="#C9A962" stroke-width="0.5"/>
        </g>

        <!-- Brand watermark -->
        <text x="1150" y="770" font-family="'Helvetica Neue', sans-serif" font-size="10"
              fill="#2F2B31" opacity="0.3" text-anchor="end" letter-spacing="2">ELEVAR</text>
    </svg>
</body>
</html>
