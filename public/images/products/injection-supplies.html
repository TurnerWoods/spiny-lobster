<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELEVAR Injection Supplies Kit</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #F6F5F3;
        }
    </style>
</head>
<body>
    <svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- Linen texture -->
            <pattern id="linen" patternUnits="userSpaceOnUse" width="4" height="4">
                <rect width="4" height="4" fill="#F6F5F3"/>
                <rect x="0" y="0" width="1" height="1" fill="#F0EEEB" opacity="0.4"/>
                <rect x="2" y="2" width="1" height="1" fill="#FAF8F6" opacity="0.4"/>
            </pattern>

            <!-- Gold gradient -->
            <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#D4B872"/>
                <stop offset="50%" style="stop-color:#C9A962"/>
                <stop offset="100%" style="stop-color:#B89A52"/>
            </linearGradient>

            <!-- Glass vial gradient -->
            <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#E5E3E0"/>
                <stop offset="15%" style="stop-color:#F8F8F8"/>
                <stop offset="40%" style="stop-color:#FFFFFF"/>
                <stop offset="60%" style="stop-color:#FAFAFA"/>
                <stop offset="85%" style="stop-color:#F2F2F2"/>
                <stop offset="100%" style="stop-color:#E0DEDA"/>
            </linearGradient>

            <!-- Charcoal cap gradient -->
            <linearGradient id="charcoalCap" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#3D393F"/>
                <stop offset="50%" style="stop-color:#2F2B31"/>
                <stop offset="100%" style="stop-color:#252225"/>
            </linearGradient>

            <!-- Syringe gradient -->
            <linearGradient id="syringe" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#ECECEC"/>
                <stop offset="30%" style="stop-color:#FFFFFF"/>
                <stop offset="70%" style="stop-color:#FAFAFA"/>
                <stop offset="100%" style="stop-color:#E8E8E8"/>
            </linearGradient>

            <!-- Shadows -->
            <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
                <feDropShadow dx="0" dy="15" stdDeviation="25" flood-color="#1a1a1a" flood-opacity="0.1"/>
            </filter>

            <filter id="subtleShadow" x="-30%" y="-30%" width="160%" height="160%">
                <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1a1a1a" flood-opacity="0.06"/>
            </filter>
        </defs>

        <!-- Background -->
        <rect width="800" height="800" fill="url(#linen)"/>

        <!-- Subtle grid pattern for premium feel -->
        <g opacity="0.03">
            <line x1="200" y1="0" x2="200" y2="800" stroke="#2F2B31" stroke-width="0.5"/>
            <line x1="400" y1="0" x2="400" y2="800" stroke="#2F2B31" stroke-width="0.5"/>
            <line x1="600" y1="0" x2="600" y2="800" stroke="#2F2B31" stroke-width="0.5"/>
            <line x1="0" y1="200" x2="800" y2="200" stroke="#2F2B31" stroke-width="0.5"/>
            <line x1="0" y1="400" x2="800" y2="400" stroke="#2F2B31" stroke-width="0.5"/>
            <line x1="0" y1="600" x2="800" y2="600" stroke="#2F2B31" stroke-width="0.5"/>
        </g>

        <!-- VIAL - Center piece -->
        <g transform="translate(400, 350)" filter="url(#softShadow)">
            <!-- Flip cap top -->
            <ellipse cx="0" cy="-10" rx="28" ry="8" fill="url(#charcoalCap)"/>

            <!-- Cap body -->
            <rect x="-28" y="-10" width="56" height="40" rx="4" fill="url(#charcoalCap)"/>

            <!-- Cap highlight ring -->
            <ellipse cx="0" cy="0" rx="26" ry="7" fill="none" stroke="#444" stroke-width="1" opacity="0.4"/>

            <!-- Aluminum crimp ring -->
            <rect x="-25" y="30" width="50" height="12" fill="#C0C0C0"/>
            <rect x="-25" y="30" width="50" height="3" fill="#D8D8D8"/>
            <rect x="-25" y="39" width="50" height="3" fill="#A8A8A8"/>

            <!-- Rubber stopper visible -->
            <rect x="-20" y="42" width="40" height="15" fill="#3A3A3A"/>

            <!-- Glass body -->
            <rect x="-28" y="57" width="56" height="130" rx="6" fill="url(#glass)"/>

            <!-- Label area -->
            <rect x="-25" y="70" width="50" height="80" fill="#2F2B31"/>

            <!-- Gold chevron logo -->
            <path d="M-10,95 L0,105 L-10,115 L-10,110 L-5,105 L-10,100 Z" fill="url(#gold)"/>

            <!-- ELEVAR text -->
            <text x="2" y="110" font-family="'Didot', 'Playfair Display', serif" font-size="12"
                  fill="url(#gold)" letter-spacing="2">ELEVAR</text>

            <!-- Product info -->
            <text x="-20" y="130" font-family="'Helvetica Neue', sans-serif" font-size="6"
                  fill="#888" letter-spacing="0.5">SEMAGLUTIDE</text>
            <text x="-20" y="140" font-family="'Helvetica Neue', sans-serif" font-size="5"
                  fill="#666" letter-spacing="0.3">2.5mg/mL | 5mL</text>

            <!-- Glass shine -->
            <rect x="-25" y="60" width="5" height="120" rx="2" fill="white" opacity="0.35"/>

            <!-- Liquid level -->
            <rect x="-24" y="150" width="48" height="35" rx="4" fill="#F8F6F4" opacity="0.5"/>

            <!-- Bottom curve of glass -->
            <ellipse cx="0" cy="185" rx="26" ry="6" fill="#E8E6E3"/>
        </g>

        <!-- INSULIN SYRINGE - Diagonal placement -->
        <g transform="translate(250, 520) rotate(-25)" filter="url(#softShadow)">
            <!-- Syringe barrel -->
            <rect x="0" y="-12" width="180" height="24" rx="3" fill="url(#syringe)"/>

            <!-- Barrel graduations -->
            <g stroke="#CCCCCC" stroke-width="0.5">
                <line x1="25" y1="-9" x2="25" y2="9"/>
                <line x1="50" y1="-7" x2="50" y2="7"/>
                <line x1="75" y1="-9" x2="75" y2="9"/>
                <line x1="100" y1="-7" x2="100" y2="7"/>
                <line x1="125" y1="-9" x2="125" y2="9"/>
                <line x1="150" y1="-7" x2="150" y2="7"/>
            </g>

            <!-- Unit markings -->
            <text x="23" y="16" font-family="Arial" font-size="5" fill="#999">10</text>
            <text x="73" y="16" font-family="Arial" font-size="5" fill="#999">30</text>
            <text x="123" y="16" font-family="Arial" font-size="5" fill="#999">50</text>

            <!-- Plunger flange -->
            <rect x="180" y="-14" width="10" height="28" rx="2" fill="#E0E0E0"/>

            <!-- Plunger handle -->
            <rect x="190" y="-10" width="35" height="20" rx="3" fill="#2F2B31"/>
            <rect x="195" y="-6" width="25" height="12" rx="2" fill="#3A363C"/>

            <!-- Needle hub -->
            <rect x="-20" y="-8" width="20" height="16" rx="2" fill="#F0F0F0"/>

            <!-- Needle -->
            <line x1="-20" y1="0" x2="-65" y2="0" stroke="#BEBEBE" stroke-width="1.5"/>
            <line x1="-65" y1="0" x2="-70" y2="0" stroke="#AEAEAE" stroke-width="1"/>

            <!-- Needle cap -->
            <rect x="-75" y="-6" width="60" height="12" rx="2" fill="#F5A855"/>
            <rect x="-75" y="-6" width="60" height="4" fill="#F7B76A"/>
        </g>

        <!-- ALCOHOL SWAB -->
        <g transform="translate(550, 580) rotate(15)" filter="url(#subtleShadow)">
            <!-- Packet -->
            <rect x="-45" y="-30" width="90" height="60" rx="4" fill="#FAFAFA"/>

            <!-- Packet border -->
            <rect x="-43" y="-28" width="86" height="56" rx="3" fill="none" stroke="#E5E5E5" stroke-width="1"/>

            <!-- Tear notch -->
            <path d="M-45,-5 L-40,-5 L-40,5 L-45,5" fill="none" stroke="#DDD" stroke-width="1"/>

            <!-- Content -->
            <text x="-30" y="-10" font-family="'Helvetica Neue', sans-serif" font-size="9" fill="#666" font-weight="500">ALCOHOL</text>
            <text x="-25" y="3" font-family="'Helvetica Neue', sans-serif" font-size="7" fill="#888">PREP PAD</text>
            <line x1="-35" y1="10" x2="35" y2="10" stroke="#EEE" stroke-width="0.5"/>
            <text x="-30" y="22" font-family="'Helvetica Neue', sans-serif" font-size="5" fill="#AAA">70% Isopropyl Alcohol</text>

            <!-- Sterile indicator -->
            <circle cx="30" cy="-15" r="8" fill="none" stroke="#4CAF50" stroke-width="0.5" opacity="0.6"/>
            <text x="26" y="-12" font-family="Arial" font-size="4" fill="#4CAF50" opacity="0.8">S</text>
        </g>

        <!-- Decorative gold circles -->
        <circle cx="120" cy="150" r="50" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.2"/>
        <circle cx="680" cy="200" r="70" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.15"/>
        <circle cx="700" cy="700" r="40" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.2"/>

        <!-- Corner accent -->
        <path d="M50,750 L50,780 L80,780" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
        <path d="M720,50 L750,50 L750,80" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>

        <!-- Brand watermark -->
        <text x="750" y="770" font-family="'Helvetica Neue', sans-serif" font-size="10"
              fill="#2F2B31" opacity="0.3" text-anchor="end" letter-spacing="2">ELEVAR</text>
    </svg>
</body>
</html>
