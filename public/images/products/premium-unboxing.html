<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELEVAR Premium Unboxing Experience</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #F6F5F3;
        }
    </style>
</head>
<body>
    <svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- Linen texture -->
            <pattern id="linen" patternUnits="userSpaceOnUse" width="5" height="5">
                <rect width="5" height="5" fill="#F6F5F3"/>
                <rect x="0" y="0" width="1" height="1" fill="#F0EEEB" opacity="0.3"/>
                <rect x="2" y="3" width="1" height="1" fill="#FAF8F6" opacity="0.3"/>
            </pattern>

            <!-- Gold gradient -->
            <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#D4B872"/>
                <stop offset="50%" style="stop-color:#C9A962"/>
                <stop offset="100%" style="stop-color:#B89A52"/>
            </linearGradient>

            <!-- Box gradients -->
            <linearGradient id="boxOuter" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#3A363C"/>
                <stop offset="100%" style="stop-color:#2F2B31"/>
            </linearGradient>

            <linearGradient id="boxInner" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#252225"/>
                <stop offset="100%" style="stop-color:#1E1C1F"/>
            </linearGradient>

            <linearGradient id="boxSide" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#1E1C1F"/>
                <stop offset="100%" style="stop-color:#2A262C"/>
            </linearGradient>

            <!-- Cream tissue paper -->
            <linearGradient id="tissue1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#FAF8F5"/>
                <stop offset="100%" style="stop-color:#F5F2EE"/>
            </linearGradient>

            <linearGradient id="tissue2" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#F8F5F2"/>
                <stop offset="100%" style="stop-color:#FFFDF9"/>
            </linearGradient>

            <!-- Glass vial -->
            <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#E8E6E3"/>
                <stop offset="20%" style="stop-color:#FAFAFA"/>
                <stop offset="50%" style="stop-color:#FFFFFF"/>
                <stop offset="80%" style="stop-color:#F5F5F5"/>
                <stop offset="100%" style="stop-color:#E0DEDA"/>
            </linearGradient>

            <!-- Charcoal cap -->
            <linearGradient id="cap" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#3A363C"/>
                <stop offset="100%" style="stop-color:#2F2B31"/>
            </linearGradient>

            <!-- Shadows -->
            <filter id="boxShadow" x="-50%" y="-50%" width="200%" height="200%">
                <feDropShadow dx="0" dy="25" stdDeviation="35" flood-color="#1a1a1a" flood-opacity="0.2"/>
            </filter>

            <filter id="tissueShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#1a1a1a" flood-opacity="0.05"/>
            </filter>

            <filter id="vialShadow" x="-50%" y="-50%" width="200%" height="200%">
                <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1a1a1a" flood-opacity="0.1"/>
            </filter>

            <!-- Emboss for logo -->
            <filter id="emboss">
                <feGaussianBlur in="SourceAlpha" stdDeviation="0.5" result="blur"/>
                <feOffset in="blur" dx="0.5" dy="0.5" result="offsetBlur"/>
                <feFlood flood-color="#1a1a1a" result="dark"/>
                <feComposite in="dark" in2="offsetBlur" operator="in" result="darkShadow"/>
                <feMerge>
                    <feMergeNode in="darkShadow"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>

        <!-- Background -->
        <rect width="1200" height="800" fill="url(#linen)"/>

        <!-- Open Box Base -->
        <g filter="url(#boxShadow)" transform="translate(600, 450)">
            <!-- Box back wall (visible because lid is open) -->
            <polygon points="-220,-120 220,-120 220,0 -220,0" fill="url(#boxOuter)"/>

            <!-- Box left wall -->
            <polygon points="-220,-120 -220,0 -280,50 -280,-70" fill="url(#boxSide)"/>

            <!-- Box right wall -->
            <polygon points="220,-120 220,0 280,50 280,-70" fill="url(#boxSide)"/>

            <!-- Box bottom (inside) -->
            <polygon points="-220,0 220,0 280,50 -280,50" fill="url(#boxInner)"/>

            <!-- Box front wall (lower) -->
            <polygon points="-280,50 280,50 280,150 -280,150" fill="url(#boxOuter)"/>

            <!-- Gold interior edge detail -->
            <line x1="-278" y1="52" x2="278" y2="52" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>

            <!-- Embossed logo on front -->
            <g transform="translate(0, 100)" filter="url(#emboss)">
                <path d="M-25,-15 L0,0 L-25,15 L-25,8 L-10,0 L-25,-8 Z" fill="url(#gold)" opacity="0.7"/>
                <text x="5" y="5" font-family="'Didot', serif" font-size="18" fill="url(#gold)" letter-spacing="4" opacity="0.7">ELEVAR</text>
            </g>
        </g>

        <!-- Open Lid (tilted back) -->
        <g transform="translate(600, 200)" filter="url(#boxShadow)">
            <!-- Lid outer surface -->
            <polygon points="-220,0 220,0 280,50 -280,50" fill="url(#boxOuter)" transform="rotate(-15)"/>

            <!-- Lid inner surface visible -->
            <polygon points="-220,0 220,0 220,10 -220,10" fill="#252225" transform="rotate(-15)"/>

            <!-- Gold edge on lid -->
            <line x1="-218" y1="2" x2="218" y2="2" stroke="url(#gold)" stroke-width="0.5" opacity="0.5" transform="rotate(-15)"/>
        </g>

        <!-- Tissue Paper Layers -->
        <g filter="url(#tissueShadow)">
            <!-- Back tissue fold -->
            <g transform="translate(600, 350)">
                <path d="M-150,-80 Q-100,-120 0,-100 Q100,-120 150,-80 L180,30 Q100,60 0,40 Q-100,60 -180,30 Z"
                      fill="url(#tissue1)" opacity="0.95"/>
                <!-- Tissue fold shadow/highlight -->
                <path d="M-100,-100 Q-50,-115 0,-100" stroke="#EBE8E3" stroke-width="1" fill="none" opacity="0.6"/>
                <path d="M50,-105 Q100,-115 140,-85" stroke="#FFFFFF" stroke-width="0.5" fill="none" opacity="0.8"/>
            </g>

            <!-- Left tissue fold -->
            <g transform="translate(420, 400)">
                <path d="M-80,-40 Q-60,-80 -20,-60 Q20,-80 60,-20 L80,60 Q40,80 0,60 Q-40,80 -80,40 Z"
                      fill="url(#tissue2)" opacity="0.9"/>
                <path d="M-40,-50 Q-20,-70 10,-55" stroke="#FFFFFF" stroke-width="0.5" fill="none" opacity="0.7"/>
            </g>

            <!-- Right tissue fold -->
            <g transform="translate(780, 380)">
                <path d="M-60,-50 Q-20,-90 40,-60 Q80,-70 100,-30 L90,50 Q50,70 0,50 Q-50,70 -80,30 Z"
                      fill="url(#tissue1)" opacity="0.92"/>
                <path d="M0,-70 Q30,-85 60,-60" stroke="#FFFFFF" stroke-width="0.5" fill="none" opacity="0.7"/>
            </g>

            <!-- Front tissue draped over edge -->
            <g transform="translate(600, 520)">
                <path d="M-120,-40 Q-60,-60 0,-50 Q60,-60 120,-40 L140,60 Q70,80 0,70 Q-70,80 -140,60 Z"
                      fill="url(#tissue2)" opacity="0.88"/>
                <path d="M-80,-45 Q0,-65 80,-45" stroke="#FFFFFF" stroke-width="0.5" fill="none" opacity="0.6"/>
            </g>
        </g>

        <!-- Vials nestled in tissue -->
        <g filter="url(#vialShadow)">
            <!-- Vial 1 - Left, slightly tilted -->
            <g transform="translate(480, 380) rotate(-10)">
                <!-- Cap -->
                <rect x="-12" y="-5" width="24" height="18" rx="2" fill="url(#cap)"/>
                <rect x="-10" y="-3" width="20" height="2" rx="1" fill="#444" opacity="0.5"/>

                <!-- Stopper -->
                <rect x="-10" y="13" width="20" height="7" fill="#4A4A4A"/>

                <!-- Glass body -->
                <rect x="-12" y="20" width="24" height="60" rx="3" fill="url(#glass)"/>

                <!-- Label -->
                <rect x="-10" y="28" width="20" height="35" fill="#2F2B31"/>
                <path d="M-4,40 L0,44 L-4,48 L-4,46 L-2,44 L-4,42 Z" fill="url(#gold)"/>
                <text x="2" y="46" font-family="'Didot', serif" font-size="5" fill="url(#gold)" letter-spacing="0.5">ELEVAR</text>
                <text x="-8" y="56" font-family="'Helvetica Neue', sans-serif" font-size="3.5" fill="#888">BPC-157</text>

                <!-- Glass shine -->
                <rect x="-10" y="22" width="3" height="55" rx="1" fill="white" opacity="0.3"/>
            </g>

            <!-- Vial 2 - Center, upright -->
            <g transform="translate(600, 360)">
                <rect x="-12" y="-5" width="24" height="18" rx="2" fill="url(#cap)"/>
                <rect x="-10" y="-3" width="20" height="2" rx="1" fill="#444" opacity="0.5"/>
                <rect x="-10" y="13" width="20" height="7" fill="#4A4A4A"/>
                <rect x="-12" y="20" width="24" height="60" rx="3" fill="url(#glass)"/>
                <rect x="-10" y="28" width="20" height="35" fill="#2F2B31"/>
                <path d="M-4,40 L0,44 L-4,48 L-4,46 L-2,44 L-4,42 Z" fill="url(#gold)"/>
                <text x="2" y="46" font-family="'Didot', serif" font-size="5" fill="url(#gold)" letter-spacing="0.5">ELEVAR</text>
                <text x="-9" y="56" font-family="'Helvetica Neue', sans-serif" font-size="3.5" fill="#888">Semaglutide</text>
                <rect x="-10" y="22" width="3" height="55" rx="1" fill="white" opacity="0.3"/>
                <!-- Liquid level -->
                <rect x="-10" y="60" width="20" height="18" rx="1" fill="#F5F3F0" opacity="0.5"/>
            </g>

            <!-- Vial 3 - Right, slightly tilted -->
            <g transform="translate(720, 385) rotate(8)">
                <rect x="-12" y="-5" width="24" height="18" rx="2" fill="url(#cap)"/>
                <rect x="-10" y="-3" width="20" height="2" rx="1" fill="#444" opacity="0.5"/>
                <rect x="-10" y="13" width="20" height="7" fill="#4A4A4A"/>
                <rect x="-12" y="20" width="24" height="60" rx="3" fill="url(#glass)"/>
                <rect x="-10" y="28" width="20" height="35" fill="#2F2B31"/>
                <path d="M-4,40 L0,44 L-4,48 L-4,46 L-2,44 L-4,42 Z" fill="url(#gold)"/>
                <text x="2" y="46" font-family="'Didot', serif" font-size="5" fill="url(#gold)" letter-spacing="0.5">ELEVAR</text>
                <text x="-8" y="56" font-family="'Helvetica Neue', sans-serif" font-size="3.5" fill="#888">PT-141</text>
                <rect x="-10" y="22" width="3" height="55" rx="1" fill="white" opacity="0.3"/>
            </g>
        </g>

        <!-- Subtle floating elements for depth -->
        <circle cx="200" cy="150" r="80" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.15"/>
        <circle cx="1000" cy="650" r="100" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.15"/>

        <!-- Brand watermark -->
        <text x="1150" y="770" font-family="'Helvetica Neue', sans-serif" font-size="10"
              fill="#2F2B31" opacity="0.3" text-anchor="end" letter-spacing="2">ELEVAR</text>
    </svg>
</body>
</html>
