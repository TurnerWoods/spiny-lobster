<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELEVAR Peptide Kit Flat Lay</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #F6F5F3;
        }
    </style>
</head>
<body>
    <svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- Linen background texture -->
            <pattern id="linen" patternUnits="userSpaceOnUse" width="6" height="6">
                <rect width="6" height="6" fill="#F6F5F3"/>
                <rect x="0" y="0" width="1" height="1" fill="#F0EEEB" opacity="0.4"/>
                <rect x="3" y="3" width="1" height="1" fill="#FAF8F6" opacity="0.4"/>
                <rect x="1" y="4" width="1" height="1" fill="#ECEAE7" opacity="0.3"/>
            </pattern>

            <!-- Gold gradient -->
            <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#D4B872"/>
                <stop offset="50%" style="stop-color:#C9A962"/>
                <stop offset="100%" style="stop-color:#B89A52"/>
            </linearGradient>

            <!-- Glass vial gradient -->
            <linearGradient id="glassVial" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#E8E6E3"/>
                <stop offset="20%" style="stop-color:#FAFAFA"/>
                <stop offset="50%" style="stop-color:#FFFFFF"/>
                <stop offset="80%" style="stop-color:#F5F5F5"/>
                <stop offset="100%" style="stop-color:#E0DEDA"/>
            </linearGradient>

            <!-- Charcoal cap gradient -->
            <linearGradient id="charcoalCap" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#3A363C"/>
                <stop offset="100%" style="stop-color:#2F2B31"/>
            </linearGradient>

            <!-- Syringe body gradient -->
            <linearGradient id="syringeBody" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#F0F0F0"/>
                <stop offset="50%" style="stop-color:#FFFFFF"/>
                <stop offset="100%" style="stop-color:#E8E8E8"/>
            </linearGradient>

            <!-- Soft shadows -->
            <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
                <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#1a1a1a" flood-opacity="0.08"/>
            </filter>

            <!-- Card shadow -->
            <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a1a1a" flood-opacity="0.06"/>
            </filter>
        </defs>

        <!-- Background -->
        <rect width="1200" height="800" fill="url(#linen)"/>

        <!-- VIAL 1 - Top Left -->
        <g transform="translate(200, 180) rotate(-15)" filter="url(#softShadow)">
            <!-- Cap -->
            <rect x="-18" y="-5" width="36" height="25" rx="3" fill="url(#charcoalCap)"/>
            <!-- Cap top shine -->
            <rect x="-15" y="-2" width="30" height="3" rx="1" fill="#444" opacity="0.5"/>

            <!-- Rubber stopper -->
            <rect x="-15" y="20" width="30" height="10" fill="#4A4A4A"/>

            <!-- Glass body -->
            <rect x="-18" y="30" width="36" height="90" rx="4" fill="url(#glassVial)"/>

            <!-- Label area -->
            <rect x="-16" y="40" width="32" height="50" fill="#2F2B31"/>

            <!-- Gold chevron on label -->
            <path d="M-5,55 L0,60 L-5,65 L-5,62 L-2,60 L-5,58 Z" fill="url(#gold)"/>
            <text x="2" y="63" font-family="'Didot', serif" font-size="7" fill="url(#gold)" letter-spacing="1">ELEVAR</text>
            <text x="-14" y="78" font-family="'Helvetica Neue', sans-serif" font-size="5" fill="#888" letter-spacing="0.5">BPC-157 5mg</text>

            <!-- Glass shine -->
            <rect x="-16" y="32" width="4" height="85" rx="2" fill="white" opacity="0.3"/>

            <!-- Liquid -->
            <rect x="-15" y="95" width="30" height="22" rx="2" fill="#F5F3F0" opacity="0.6"/>
        </g>

        <!-- VIAL 2 - Center -->
        <g transform="translate(450, 280) rotate(5)" filter="url(#softShadow)">
            <!-- Cap -->
            <rect x="-18" y="-5" width="36" height="25" rx="3" fill="url(#charcoalCap)"/>
            <rect x="-15" y="-2" width="30" height="3" rx="1" fill="#444" opacity="0.5"/>

            <!-- Rubber stopper -->
            <rect x="-15" y="20" width="30" height="10" fill="#4A4A4A"/>

            <!-- Glass body -->
            <rect x="-18" y="30" width="36" height="90" rx="4" fill="url(#glassVial)"/>

            <!-- Label -->
            <rect x="-16" y="40" width="32" height="50" fill="#2F2B31"/>
            <path d="M-5,55 L0,60 L-5,65 L-5,62 L-2,60 L-5,58 Z" fill="url(#gold)"/>
            <text x="2" y="63" font-family="'Didot', serif" font-size="7" fill="url(#gold)" letter-spacing="1">ELEVAR</text>
            <text x="-14" y="78" font-family="'Helvetica Neue', sans-serif" font-size="5" fill="#888" letter-spacing="0.5">Semaglutide 2.5mg</text>

            <!-- Glass shine -->
            <rect x="-16" y="32" width="4" height="85" rx="2" fill="white" opacity="0.3"/>

            <!-- Liquid -->
            <rect x="-15" y="85" width="30" height="32" rx="2" fill="#F5F3F0" opacity="0.6"/>
        </g>

        <!-- VIAL 3 - Top Right -->
        <g transform="translate(700, 200) rotate(20)" filter="url(#softShadow)">
            <!-- Cap -->
            <rect x="-18" y="-5" width="36" height="25" rx="3" fill="url(#charcoalCap)"/>
            <rect x="-15" y="-2" width="30" height="3" rx="1" fill="#444" opacity="0.5"/>

            <!-- Rubber stopper -->
            <rect x="-15" y="20" width="30" height="10" fill="#4A4A4A"/>

            <!-- Glass body -->
            <rect x="-18" y="30" width="36" height="90" rx="4" fill="url(#glassVial)"/>

            <!-- Label -->
            <rect x="-16" y="40" width="32" height="50" fill="#2F2B31"/>
            <path d="M-5,55 L0,60 L-5,65 L-5,62 L-2,60 L-5,58 Z" fill="url(#gold)"/>
            <text x="2" y="63" font-family="'Didot', serif" font-size="7" fill="url(#gold)" letter-spacing="1">ELEVAR</text>
            <text x="-14" y="78" font-family="'Helvetica Neue', sans-serif" font-size="5" fill="#888" letter-spacing="0.5">PT-141 10mg</text>

            <!-- Glass shine -->
            <rect x="-16" y="32" width="4" height="85" rx="2" fill="white" opacity="0.3"/>
        </g>

        <!-- SYRINGE 1 - Horizontal -->
        <g transform="translate(280, 500) rotate(-8)" filter="url(#softShadow)">
            <!-- Barrel -->
            <rect x="0" y="-8" width="140" height="16" rx="2" fill="url(#syringeBody)"/>

            <!-- Measurement lines -->
            <g stroke="#CCC" stroke-width="0.5">
                <line x1="20" y1="-6" x2="20" y2="6"/>
                <line x1="40" y1="-4" x2="40" y2="4"/>
                <line x1="60" y1="-6" x2="60" y2="6"/>
                <line x1="80" y1="-4" x2="80" y2="4"/>
                <line x1="100" y1="-6" x2="100" y2="6"/>
                <line x1="120" y1="-4" x2="120" y2="4"/>
            </g>

            <!-- Plunger end -->
            <rect x="140" y="-10" width="8" height="20" rx="1" fill="#E0E0E0"/>
            <rect x="148" y="-6" width="25" height="12" rx="2" fill="#2F2B31"/>

            <!-- Needle hub -->
            <rect x="-15" y="-5" width="15" height="10" rx="1" fill="#E8E8E8"/>

            <!-- Needle -->
            <line x1="-15" y1="0" x2="-50" y2="0" stroke="#C0C0C0" stroke-width="1"/>

            <!-- Needle cap (orange for insulin) -->
            <rect x="-55" y="-4" width="45" height="8" rx="2" fill="#F5A855" opacity="0.9"/>
        </g>

        <!-- SYRINGE 2 -->
        <g transform="translate(550, 560) rotate(12)" filter="url(#softShadow)">
            <rect x="0" y="-8" width="140" height="16" rx="2" fill="url(#syringeBody)"/>
            <g stroke="#CCC" stroke-width="0.5">
                <line x1="20" y1="-6" x2="20" y2="6"/>
                <line x1="40" y1="-4" x2="40" y2="4"/>
                <line x1="60" y1="-6" x2="60" y2="6"/>
                <line x1="80" y1="-4" x2="80" y2="4"/>
                <line x1="100" y1="-6" x2="100" y2="6"/>
            </g>
            <rect x="140" y="-10" width="8" height="20" rx="1" fill="#E0E0E0"/>
            <rect x="148" y="-6" width="25" height="12" rx="2" fill="#2F2B31"/>
            <rect x="-15" y="-5" width="15" height="10" rx="1" fill="#E8E8E8"/>
            <line x1="-15" y1="0" x2="-50" y2="0" stroke="#C0C0C0" stroke-width="1"/>
            <rect x="-55" y="-4" width="45" height="8" rx="2" fill="#F5A855" opacity="0.9"/>
        </g>

        <!-- ALCOHOL SWABS - Scattered -->
        <g filter="url(#cardShadow)">
            <!-- Swab packet 1 -->
            <g transform="translate(880, 320) rotate(25)">
                <rect x="-30" y="-20" width="60" height="40" rx="3" fill="#FAFAFA"/>
                <rect x="-28" y="-18" width="56" height="36" rx="2" fill="none" stroke="#E0E0E0" stroke-width="0.5"/>
                <text x="-20" y="-5" font-family="'Helvetica Neue', sans-serif" font-size="6" fill="#888">ALCOHOL</text>
                <text x="-15" y="5" font-family="'Helvetica Neue', sans-serif" font-size="5" fill="#AAA">PREP PAD</text>
                <text x="-10" y="14" font-family="'Helvetica Neue', sans-serif" font-size="4" fill="#CCC">70% Isopropyl</text>
            </g>

            <!-- Swab packet 2 -->
            <g transform="translate(950, 450) rotate(-10)">
                <rect x="-30" y="-20" width="60" height="40" rx="3" fill="#FAFAFA"/>
                <rect x="-28" y="-18" width="56" height="36" rx="2" fill="none" stroke="#E0E0E0" stroke-width="0.5"/>
                <text x="-20" y="-5" font-family="'Helvetica Neue', sans-serif" font-size="6" fill="#888">ALCOHOL</text>
                <text x="-15" y="5" font-family="'Helvetica Neue', sans-serif" font-size="5" fill="#AAA">PREP PAD</text>
            </g>

            <!-- Swab packet 3 -->
            <g transform="translate(130, 450) rotate(-5)">
                <rect x="-30" y="-20" width="60" height="40" rx="3" fill="#FAFAFA"/>
                <rect x="-28" y="-18" width="56" height="36" rx="2" fill="none" stroke="#E0E0E0" stroke-width="0.5"/>
                <text x="-20" y="-5" font-family="'Helvetica Neue', sans-serif" font-size="6" fill="#888">ALCOHOL</text>
                <text x="-15" y="5" font-family="'Helvetica Neue', sans-serif" font-size="5" fill="#AAA">PREP PAD</text>
            </g>
        </g>

        <!-- INSTRUCTION CARD -->
        <g transform="translate(900, 600) rotate(-5)" filter="url(#cardShadow)">
            <rect x="-100" y="-70" width="200" height="140" rx="4" fill="#FAF8F5"/>
            <rect x="-95" y="-65" width="190" height="130" rx="2" fill="none" stroke="#E8E4DE" stroke-width="1"/>

            <!-- Card content -->
            <path d="M-60,-30 L-50,-20 L-60,-10 L-60,-15 L-53,-20 L-60,-25 Z" fill="url(#gold)"/>
            <text x="-45" y="-17" font-family="'Didot', serif" font-size="14" fill="#2F2B31" letter-spacing="2">ELEVAR</text>

            <text x="-80" y="5" font-family="'Helvetica Neue', sans-serif" font-size="8" fill="#666" letter-spacing="1">PREPARATION GUIDE</text>

            <line x1="-80" y1="15" x2="80" y2="15" stroke="#E8E4DE" stroke-width="0.5"/>

            <text x="-80" y="30" font-family="'Helvetica Neue', sans-serif" font-size="6" fill="#888">1. Clean injection site with alcohol swab</text>
            <text x="-80" y="42" font-family="'Helvetica Neue', sans-serif" font-size="6" fill="#888">2. Draw prescribed dose from vial</text>
            <text x="-80" y="54" font-family="'Helvetica Neue', sans-serif" font-size="6" fill="#888">3. Inject subcutaneously at 45 degree angle</text>
        </g>

        <!-- Decorative gold accents -->
        <circle cx="1100" cy="100" r="40" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.3"/>
        <circle cx="100" cy="700" r="60" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.3"/>

        <!-- Brand watermark -->
        <text x="1150" y="770" font-family="'Helvetica Neue', sans-serif" font-size="10"
              fill="#2F2B31" opacity="0.3" text-anchor="end" letter-spacing="2">ELEVAR</text>
    </svg>
</body>
</html>
